<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Self-Produced Works — Taylor Michaels</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="inner">
      <h1>Self-Produced Works</h1>
      <p class="tagline">Original content I've written and/or produced</p>
      <a class="nav-link" href="index.html">← Back to home</a>
    </div>
  </header>

  <main class="content inner">
    <div class="section-intro">
      <h2>YouTube</h2>
    </div>

    <section id="youtube_self" class="shows-grid" aria-label="youtube work"></section>

    <br></br>

    <div class="section-intro">
      <h2>Audio Drama</h2>
    </div>

    <section id="audiodrama_self" class="shows-grid" aria-label="bts work"></section>
  </main>

  <footer class="site-footer">
    <div class="inner footer-content">
      <div class="social-icons" aria-label="Social media links">
        <a href="https://bsky.app/profile/taytayheyheyva.bsky.social" target="_blank" rel="noopener noreferrer" aria-label="Bluesky">
          <img src="images/icons/bluesky.svg" alt="" />
        </a>
  
        <a href="https://www.twitch.tv/taytayheyheyva" target="_blank" rel="noopener noreferrer" aria-label="Twitch">
          <img src="images/icons/twitch.svg" alt="" />
        </a>
  
        <a href="https://www.youtube.com/@taytayheyheyva" target="_blank" rel="noopener noreferrer" aria-label="YouTube">
          <img src="images/icons/youtube.svg" alt="" />
        </a>
  
        <a href="mailto:taylormichaels.va@gmail.com" aria-label="Email">
          <img src="images/icons/gmail.svg" alt="" />
        </a>
      </div>
    </div>

    <div class="inner">
      <p>© Taylor Michaels - 2026</p>
    </div>
  </footer>

  <script type="module">
    import { createMediaCard, renderRoles, episodeLabel }
    from "./scripts/rendercards.js";
    import { youtube_self, audiodrama_self }
    from "./data/collections.js";

    const grid = document.getElementById("youtube_self");

    youtube_self.forEach((show) => {
      const { card, meta } = createMediaCard(show);

      meta.innerHTML = `
        <h3>${show.title}</h3>
        <p class="stats">${episodeLabel(show.episodes)} | ${show.years}</p>
        ${renderRoles(show.roles)}
      `;

      grid.appendChild(card);
    });

    const audiodrama_self_grid = document.getElementById("audiodrama_self");

    audiodrama_self.forEach((bts) => {
      const { card, meta } = createMediaCard(bts);

      meta.innerHTML = `
        <h3>${bts.title}</h3>
        <p class="stats">${bts.years}</p>
        ${renderRoles(bts.roles)}
      `;

      audiodrama_self_grid.appendChild(card);
    });
  </script>
</body>
</html>
