        artwork: "images/hollow.jfif",
        years: "2025",
        episodes: 2,
        roles: ["Officer Lowley (Supporting)"]
      }
    ];

    const grid = document.getElementById("shows");

    function episodeLabel(count) {
      return `${count} episode${count === 1 ? "" : "s"}`;
    }

    function renderRoles(roles) {
      const items = roles.map((role) => `<p class="roles"><i>${role}</i></p>`).join("");
      return `${items}`;
    }

    shows.forEach((show) => {
      const card = document.createElement("article");
      card.className = "show-card";

      const art = document.createElement("div");
      art.className = "show-art";
      art.setAttribute("aria-hidden", "true");

      const meta = document.createElement("div");
      meta.className = "show-meta";
      meta.innerHTML = `
        <h3>${show.title}</h3>
        <p class="stats">${episodeLabel(show.episodes)} | ${show.years}</p>
        ${renderRoles(show.roles)}
      `;

      if (show.artwork) {
      const img = document.createElement("img");
      img.src = show.artwork;
        img.alt = `${show.title} cover art`;
        img.loading = "lazy";

        art.appendChild(img);
      }

      card.appendChild(art);
      card.appendChild(meta);
      grid.appendChild(card);
    });
  </script>

  <script>

    bts_array.forEach((bts) => {
      const card = document.createElement("article");
      card.className = "show-card";

      const art = document.createElement("div");
      art.className = "show-art";

      const meta = document.createElement("div");
      meta.className = "show-meta";
      meta.innerHTML = `
        <h3>${bts.title}</h3>

      if (bts.artwork) {
        const img = document.createElement("img");
        img.src = bts.artwork;
        img.alt = `${bts.title} cover art`;
        img.loading = "lazy";

        art.appendChild(img);

      card.appendChild(art);

      bts_grid.appendChild(card);
