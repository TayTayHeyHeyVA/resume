<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Music — Taylor Michaels</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="inner">
      <h1>Music</h1>
      <p class="tagline">Recorded songs and covers</p>
      <a class="nav-link" href="index.html">← Back to home</a>
    </div>
  </header>

  <main class="content inner">
    <div class="section-intro">
      <h2>Recorded Songs</h2>
    </div>

    <section id="music" class="shows-grid" aria-label="music work"></section>
  </main>

  <footer class="site-footer">
    <div class="inner footer-content">
      <div class="social-icons" aria-label="Social media links">
        <a href="https://bsky.app/profile/taytayheyheyva.bsky.social" target="_blank" rel="noopener noreferrer" aria-label="Bluesky">
          <img src="images/icons/bluesky.svg" alt="" />
        </a>
  
        <a href="https://www.twitch.tv/taytayheyheyva" target="_blank" rel="noopener noreferrer" aria-label="Twitch">
          <img src="images/icons/twitch.svg" alt="" />
        </a>
  
        <a href="https://www.youtube.com/@taytayheyheyva" target="_blank" rel="noopener noreferrer" aria-label="YouTube">
          <img src="images/icons/youtube.svg" alt="" />
        </a>
  
        <a href="mailto:taylormichaels.va@gmail.com" aria-label="Email">
          <img src="images/icons/gmail.svg" alt="" />
        </a>
      </div>
    </div>

    <div class="inner">
      <p>© Taylor Michaels - 2026</p>
    </div>
  </footer>

  <script type="module">
    import { createMediaCard, renderRoles, episodeLabel }
    from "./scripts/rendercards.js";
    import { music }
    from "./data/collections.js";

    const music_grid = document.getElementById("music");

    music.forEach((show) => {
      const { card, meta } = createMediaCard(show);

      meta.innerHTML = `
        <h3>${show.title}</h3>
        <p class="stats">${show.years}</p>
        ${renderRoles(show.roles)}
      `;

      music_grid.appendChild(card);
    });
  </script>
</body>
</html>
