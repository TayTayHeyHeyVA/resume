<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Experience — Taylor Michaels</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="inner">
      <h1>Experience</h1>
      <p class="tagline">Credits, roles, and behind-the-scenes work</p>
      <a class="nav-link" href="index.html">← Back to home</a>
    </div>
  </header>

  <main class="content inner">
    <div class="section-intro">
      <h2>Audio Drama</h2>
    </div>

    <section id="audiodramas" class="shows-grid" aria-label="Audio-Drama"></section>

    <br></br>

    <div class="section-intro">
      <h2>Analog Horror</h2>
    </div>

    <section id="analog_horror" class="shows-grid" aria-label="Analog-Horror"></section>

    <br></br>


    <div class="section-intro">
      <h2>Behind the Scenes</h2>
    </div>

    <section id="behind_the_scenes" class="shows-grid" aria-label="Behind-the-Scenes"></section>
  </main>

  <footer class="site-footer">
    <div class="inner">
      <p>© Taylor Michaels</p>
    </div>
  </footer>

  <script type="module">
    import { createMediaCard, renderRoles, episodeLabel }
    from "./scripts/rendercards.js";
    import { audiodramas, behind_the_scenes, analog_horror }
    from "./data/collections.js";

    const grid = document.getElementById("audiodramas");

    audiodramas.forEach((show) => {
      const { card, meta } = createMediaCard(show);

      meta.innerHTML = `
        <h3>${show.title}</h3>
        <p class="stats">${episodeLabel(show.episodes)} | ${show.years}</p>
        ${renderRoles(show.roles)}
      `;

      grid.appendChild(card);
    });

    const analog_grid = document.getElementById("analog_horror");

    analog_horror.forEach((show) => {
      const { card, meta } = createMediaCard(show);

      meta.innerHTML = `
        <h3>${show.title}</h3>
        <p class="stats">${episodeLabel(show.episodes)} | ${show.years}</p>
        ${renderRoles(show.roles)}
      `;

      analog_grid.appendChild(card);
    });

    const bts_grid = document.getElementById("behind_the_scenes");

    behind_the_scenes.forEach((bts) => {
      const { card, meta } = createMediaCard(bts);

      meta.innerHTML = `
        <h3>${bts.title}</h3>
        <p class="stats">${bts.years}</p>
        ${renderRoles(bts.roles)}
      `;

      bts_grid.appendChild(card);
    });
  </script>
</body>
</html>
